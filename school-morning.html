<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Morning Checklist</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Checklists">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>School Morning Checklist</h1>

<div class="columns">

  <div class="section uniform">
    <div class="section-header"><span class="emoji">👕</span><span class="label">UNIFORM</span></div>
    <div class="section-body">
      <div class="item">ID card</div>
      <div class="item">Specs</div>
    </div>
  </div>

  <div class="section food">
    <div class="section-header"><span class="emoji">🍱</span><span class="label">LUNCH BAG</span></div>
    <div class="section-body">
      <div class="item">Spoon</div>
      <div class="item">Water bottle</div>
      <div class="item">Towel</div>
    </div>
  </div>

  <div class="section school-bag">
    <div class="section-header"><span class="emoji">🎒</span><span class="label">SCHOOL BAG</span></div>
    <div class="section-body">
      <div class="item">Pencil box</div>
      <div class="item">Books to bring</div>
      <div class="item">Project items</div>
    </div>
  </div>

  <div class="section others">
    <div class="section-header"><span class="emoji">📌</span><span class="label">OTHERS</span></div>
    <div class="section-body">
      <div class="item">Exam colors</div>
      <div class="item">Exam pad</div>
      <div class="item">Pray</div>
    </div>
  </div>

</div>

<div class="notes">
  Notes
  <div class="note-line"></div>
  <div class="note-line"></div>
  <div class="note-line"></div>
</div>

<script src="checklist.js"></script>
</body>
</html>
