<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklists</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Checklists">
<meta name="description" content="Family checklists for trips and going out">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f5f5f0;
    color: #1a1a1a;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  header p {
    margin-top: 6px;
    font-size: 14px;
    color: #888;
    font-weight: 500;
  }

  .grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 420px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #fff;
    border-radius: 16px;
    padding: 20px 22px;
    text-decoration: none;
    color: inherit;
    border: 1.5px solid #e0e0e0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .card:active {
    transform: scale(0.97);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .card-icon {
    font-size: 32px;
    line-height: 1;
    flex-shrink: 0;
  }

  .card-text h2 {
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .card-text p {
    margin-top: 3px;
    font-size: 13px;
    color: #888;
    font-weight: 500;
  }

  .card-arrow {
    margin-left: auto;
    font-size: 18px;
    color: #ccc;
    flex-shrink: 0;
  }

  .card.going-out { border-color: #4B6A88; }
  .card.last-day  { border-color: #B85450; }
  .card.last-week { border-color: #5A8A6A; }

  footer {
    margin-top: 40px;
    font-size: 12px;
    color: #bbb;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<header>
  <h1>Checklists</h1>
  <p>Tap a checklist to open it</p>
</header>

<div class="grid">
  <a class="card going-out" href="going-out.html">
    <span class="card-icon">🚪</span>
    <div class="card-text">
      <h2>Going Out</h2>
      <p>Essentials before leaving home</p>
    </div>
    <span class="card-arrow">›</span>
  </a>

  <a class="card last-day" href="last-day.html">
    <span class="card-icon">🧳</span>
    <div class="card-text">
      <h2>Last Day</h2>
      <p>Hometown trip — 6 PM onwards</p>
    </div>
    <span class="card-arrow">›</span>
  </a>

  <a class="card last-week" href="last-week.html">
    <span class="card-icon">🏠</span>
    <div class="card-text">
      <h2>Last Week</h2>
      <p>Hometown trip — cleaning prep</p>
    </div>
    <span class="card-arrow">›</span>
  </a>
</div>

<footer>Family checklists</footer>

</body>
</html>
